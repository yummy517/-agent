version: "3.9"

services:
  # ── 主应用 ────────────────────────────────────────────────
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY}
      - LANGCHAIN_TRACING_V2=true
      - REDIS_URL=redis://redis:6379/0
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - MCP_SERVER_URL=http://mcp-ppt:8001
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./output:/app/output
      - ./logs:/app/logs
    restart: unless-stopped

  # ── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # ── MCP PPT 服务 (示例占位) ────────────────────────────────
  mcp-ppt:
    image: your-mcp-ppt-server:latest
    ports:
      - "8001:8001"
    volumes:
      - ./output/ppt:/output
    restart: unless-stopped

volumes:
  redis_data:
